<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>灵体重计量仪 - 见习女巫</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-blue: #e6f2ff;
            --secondary-blue: #cce7ff;
            --accent-blue: #a3d5ff;
            --soft-blue: #b8daff;
            --pale-blue: #f0f8ff;
            
            --text-dark: #4a5568;
            --text-light: #718096;
            --text-lighter: #a0aec0;
            
            --card-bg: rgba(255, 255, 255, 0.65);
            --card-border: rgba(255, 255, 255, 0.4);
            --shadow-sm: 0 2px 8px rgba(174, 200, 236, 0.1);
            --shadow-md: 0 4px 12px rgba(174, 200, 236, 0.15);
            --radius-sm: 8px;
            --radius-md: 10px;
            --radius-lg: 14px;
            
            --border-light: 1px solid rgba(226, 232, 240, 0.3);
        }

        * { 
            box-sizing: border-box; 
            font-family: 'Noto Sans SC', 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif; 
        }

        body {
            background-color: var(--primary-blue);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            color: var(--text-dark);
            overflow-x: hidden;
            line-height: 1.5;
            font-size: 13px;
        }

        .weight-container {
            max-width: 900px;
            margin: auto;
            position: relative;
            z-index: 1;
        }

        .header {
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            margin-bottom: 24px; 
            padding: 18px 0 12px 0;
            background: transparent;
            backdrop-filter: none;
            border-radius: 0;
            box-shadow: none;
            border: none;
            position: relative;
        }
        
        .header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 3px;
            background: var(--accent-blue);
            border-radius: 2px;
        }
        
        .header h1 { 
            color: var(--text-dark); 
            margin: 0; 
            font-weight: 300;
            letter-spacing: 2px;
            font-family: 'Noto Serif SC', serif;
            font-size: 1.6em;
        }
        
        .header h1 i { 
            margin-right: 10px; 
            color: var(--accent-blue);
        }
        
        .back-link { 
            color: var(--text-light); 
            text-decoration: none; 
            font-weight: 500;
            font-size: 0.9em;
            transition: color 0.2s;
        }
        
        .back-link:hover { 
            color: var(--accent-blue);
        }

        .input-panel {
            background: var(--card-bg); 
            backdrop-filter: blur(8px);
            border-radius: var(--radius-md); 
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-sm);
            text-align: center;
            border: var(--border-light);
            border-left: none;
            transition: all 0.3s ease;
        }
        
        .input-panel:hover {
            box-shadow: var(--shadow-md);
        }
        
        .input-panel label { 
            font-size: 1em; 
            color: var(--text-light); 
            font-weight: 500;
        }
        
        .input-wrapper { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 8px; 
            margin: 15px 0; 
        }
        
        .input-wrapper input {
            width: 150px; 
            font-size: 2.2em; 
            font-weight: 600; 
            color: var(--accent-blue);
            border: none; 
            background: transparent; 
            text-align: center;
            border-bottom: 2px dashed var(--soft-blue);
            padding-bottom: 5px;
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
        }
        
        .input-wrapper input:focus {
            outline: none;
            border-bottom-color: var(--accent-blue);
        }
        
        .input-wrapper span { 
            font-size: 1.5em; 
            color: var(--text-light); 
            font-weight: 500;
        }
        
        .btn-save {
            padding: 10px 30px; 
            font-size: 0.95em; 
            border: none; 
            border-radius: 20px;
            background: linear-gradient(135deg, var(--accent-blue), var(--soft-blue));
            color: white; 
            cursor: pointer; 
            transition: all 0.3s;
            box-shadow: var(--shadow-sm);
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        
        .btn-save:hover { 
            transform: translateY(-2px); 
            box-shadow: var(--shadow-md);
        }
        
        .btn-save:active { 
            transform: scale(0.98); 
        }

        .history-panel {
            background: var(--card-bg); 
            backdrop-filter: blur(8px);
            border-radius: var(--radius-md); 
            padding: 18px;
            box-shadow: var(--shadow-sm);
            border: var(--border-light);
            border-left: none;
            transition: all 0.3s ease;
        }
        
        .history-panel:hover {
            box-shadow: var(--shadow-md);
        }
        
        .history-header {
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            margin-bottom: 15px; 
            border-bottom: var(--border-light);
            padding-bottom: 8px;
        }
        
        .history-header h2 { 
            margin: 0; 
            color: var(--text-dark); 
            font-size: 1em;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        
        .history-header h2 i {
            color: var(--accent-blue);
            margin-right: 8px;
        }
        
        .btn-export {
            padding: 6px 14px; 
            border: none; 
            border-radius: 15px;
            background: rgba(163, 213, 255, 0.2); 
            color: var(--text-dark); 
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.8em;
            font-weight: 500;
        }
        
        .btn-export:hover { 
            background: rgba(163, 213, 255, 0.3); 
            color: var(--accent-blue);
        }

        .history-list { 
            max-height: 280px; 
            overflow-y: auto; 
            padding-right: 8px; 
        }
        
        .history-item {
            display: grid; 
            grid-template-columns: 1fr 1fr 1fr; 
            align-items: center;
            padding: 10px; 
            margin-bottom: 8px; 
            background: rgba(255, 255, 255, 0.4);
            border-radius: var(--radius-sm); 
            transition: transform 0.2s;
            border: var(--border-light);
            border-left: none;
        }
        
        .history-item:hover { 
            transform: translateX(3px); 
            background: rgba(255, 255, 255, 0.6);
        }
        
        .history-date { 
            font-weight: 600; 
            color: var(--text-dark); 
            font-size: 0.85em;
        }
        
        .history-weight { 
            font-size: 1.2em; 
            font-weight: 600; 
            color: var(--accent-blue); 
            text-align: center; 
        }
        
        .history-diff { 
            text-align: right; 
            font-weight: 600; 
            font-size: 0.85em;
        }
        
        .diff-down { 
            color: #7eb8da; 
        }
        
        .diff-up { 
            color: #ff9a9e; 
        }
        
        .diff-even { 
            color: #ffcb6b; 
        }

        ::-webkit-scrollbar { 
            width: 5px; 
        }
        
        ::-webkit-scrollbar-track { 
            background: transparent; 
        }
        
        ::-webkit-scrollbar-thumb { 
            background: var(--accent-blue); 
            border-radius: 3px; 
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--soft-blue);
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-light);
        }
        
        .empty-state i { 
            font-size: 2.5em; 
            margin-bottom: 12px; 
            opacity: 0.5; 
        }
        
        .empty-state p { 
            font-size: 0.9em;
            line-height: 1.5;
        }

        @media (max-width: 768px) {
            body {
                padding: 15px;
                font-size: 12px;
            }
            
            .header {
                flex-direction: column;
                gap: 12px;
                text-align: center;
            }
            
            .header::after {
                width: 60px;
            }
            
            .input-wrapper input {
                width: 120px;
                font-size: 1.8em;
            }
            
            .history-item {
                grid-template-columns: 1fr;
                gap: 5px;
                text-align: center;
            }
            
            .history-weight, .history-diff {
                text-align: center;
            }
        }

        /* ===== API Key 弹窗样式 ===== */
        #apiKeyModal {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 99999;
            display: flex; align-items: center; justify-content: center;
        }
        #apiKeyModal.hidden { display: none; }
        .api-key-box {
            background: white;
            padding: 28px 24px;
            border-radius: var(--radius-md);
            width: 360px;
            text-align: center;
            box-shadow: var(--shadow-lg);
        }
        .api-key-box h3 {
            margin-bottom: 14px;
            color: var(--text-dark);
            font-size: 1.1em;
        }
        .api-key-box input {
            width: 100%;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 0.95em;
            margin-bottom: 12px;
        }
        .api-key-box button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--accent-blue), var(--soft-blue));
            color: white;
            font-size: 1em;
            cursor: pointer;
        }
        .api-key-tip {
            font-size: 0.75em;
            color: var(--text-light);
            margin-top: 10px;
        }
    </style>
</head>
<body>

<!-- ===== API Key 弹窗 ===== -->
<div id="apiKeyModal">
    <div class="api-key-box">
        <h3>🔑 请输入 GitHub Token</h3>
        <input id="apiKeyInput" type="password" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
        <button onclick="saveApiKey()">保存并进入</button>
        <div class="api-key-tip">
            只需输入一次，Token 仅保存在本浏览器<br>
            权限仅需勾选 <strong>gist</strong>
        </div>
    </div>
</div>

<div class="weight-container">
    <!-- Header -->
    <div class="header">
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> 返回观测台</a>
        <h1><i class="fas fa-weight-hanging"></i> 灵体重计量仪</h1>
        <div></div>
    </div>

    <!-- Input Panel -->
    <div class="input-panel">
        <label>今日灵体质量 (kg)</label>
        <div class="input-wrapper">
            <input type="number" id="weightInput" step="0.1" placeholder="--.-">
            <span>kg</span>
        </div>
        <button class="btn-save" onclick="saveWeight()">
            <i class="fas fa-magic"></i> 封存今日数据
        </button>
    </div>

    <!-- History Panel -->
    <div class="history-panel">
        <div class="history-header">
            <h2><i class="fas fa-scroll"></i> 历史测量卷轴</h2>
            <button class="btn-export" onclick="exportWeights()">
                <i class="fas fa-file-download"></i> 导出卷轴
            </button>
        </div>
        <div class="history-list" id="historyList"></div>
    </div>
</div>

<script>
/* ==========================================
   API Key 管理（不再依赖 gist-db.js）
   ========================================== */
const STORAGE_KEY = 'witch_api_key';
const GIST_ID = 'c9b52465d580c277cb7e55ac9e589ed4';
const GIST_FILE = 'witchlife.json';
const WEIGHT_DB_KEY = 'witchWeightDB';

function getApiKey() {
    return localStorage.getItem(STORAGE_KEY) || '';
}

function saveApiKey() {
    const key = document.getElementById('apiKeyInput').value.trim();
    if (!key) return alert('请输入 Token');
    localStorage.setItem(STORAGE_KEY, key);
    document.getElementById('apiKeyModal').classList.add('hidden');
    loadWeightData();
}

/* 页面加载时判断是否已输入 Key */
document.addEventListener('DOMContentLoaded', () => {
    if (getApiKey()) {
        document.getElementById('apiKeyModal').classList.add('hidden');
        loadWeightData();
    }
});

/* ==========================================
   Gist 云端数据库（动态读取 Token）
   ========================================== */
async function gistLoad() {
    const res = await fetch(`https://api.github.com/gists/${GIST_ID}`);
    if (!res.ok) throw new Error();
    const gist = await res.json();
    if (gist.files[GIST_FILE]?.content) {
        return JSON.parse(gist.files[GIST_FILE].content);
    }
    return {};
}

async function gistSave(data) {
    const token = getApiKey();
    if (!token) return false;
    const res = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
        method: 'PATCH',
        headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({
            files: {
                [GIST_FILE]: { content: JSON.stringify(data, null, 2) }
            }
        })
    });
    return res.ok;
}

async function getWeightData() {
    const all = await gistLoad();
    return all[WEIGHT_DB_KEY] || [];
}

async function saveWeightData(weight) {
    const all = await gistLoad();
    all[WEIGHT_DB_KEY] = weight;
    return gistSave(all);
}

/* ==========================================
   内存缓存
   ========================================== */
let weightDB = [];

/* ==========================================
   初始化加载
   ========================================== */
async function loadWeightData() {
    try {
        weightDB = await getWeightData();
        renderHistory();
        console.log('灵体重计量仪启动完成，共加载', weightDB.length, '条体重记录');
    } catch {
        alert('⚠️ 读取云端数据失败，请检查 Token 是否正确');
    }
}

/* ==========================================
   渲染逻辑
   ========================================== */
function renderHistory() {
    const list = document.getElementById('historyList');
    
    if (weightDB.length === 0) {
        list.innerHTML = `
            <div class="empty-state">
                <i class="fas fa-weight-hanging"></i>
                <p>还没有测量记录哦~<br>开始记录你的第一次灵体质量吧！</p>
            </div>
        `;
        return;
    }

    // 倒序显示，最新的在上面
    [...weightDB].reverse().forEach(record => {
        let diffHtml = '<span>--</span>';
        if (record.diff !== undefined && record.diff !== null) {
            let diffClass = 'diff-even';
            let diffSign = '';
            if (record.diff > 0) { diffClass = 'diff-up'; diffSign = '+'; }
            else if (record.diff < 0) { diffClass = 'diff-down'; diffSign = ''; }
            diffHtml = `<span class="${diffClass}">${diffSign}${record.diff.toFixed(1)} kg</span>`;
        }

        const item = document.createElement('div');
        item.className = 'history-item';
        item.innerHTML = `
            <div class="history-date">${record.date}</div>
            <div class="history-weight">${record.weight.toFixed(1)} kg</div>
            <div class="history-diff">${diffHtml}</div>
        `;
        list.appendChild(item);
    });
}

/* ==========================================
   核心功能
   ========================================== */
async function saveWeight() {
    const input = document.getElementById('weightInput');
    const weight = parseFloat(input.value);

    if (!weight || weight <= 0) {
        alert('请输入有效的体重数值哦，见习女巫~');
        return;
    }

    const today = new Date().toISOString().split('T')[0];
    let db = weightDB;

    // 检查今天是否已经记录过
    const existingIndex = db.findIndex(r => r.date === today);
    if (existingIndex > -1) {
        if (!confirm('今日已有记录，是否覆盖？')) return;
        db.splice(existingIndex, 1);
    }

    // 计算差值
    let diff = null;
    if (db.length > 0) {
        const lastRecord = [...db].sort((a, b) => new Date(b.date) - new Date(a.date))[0];
        diff = parseFloat((weight - lastRecord.weight).toFixed(1));
    }

    const newRecord = { date: today, weight: weight, diff: diff };
    
    // 插入并保持按日期排序
    db.push(newRecord);
    db.sort((a, b) => new Date(a.date) - new Date(b.date));
    
    // 重新计算所有差值
    for (let i = 1; i < db.length; i++) {
        db[i].diff = parseFloat((db[i].weight - db[i-1].weight).toFixed(1));
    }

    await saveWeightData(db);
    renderHistory();
    input.value = '';
    
    // 提示
    let msg = '数据封存成功！';
    if (diff !== null) {
        if (diff > 0) msg += ` 哎呀，比上次重了 ${diff}kg...`;
        else if (diff < 0) msg += ` 太棒了，比上次轻了 ${-diff}kg！`;
        else msg += ` 和上次持平哦。`;
    }
    alert(msg);
}

function exportWeights() {
    const db = weightDB;
    if (db.length === 0) {
        alert('卷轴空空如也，先记录几次吧~');
        return;
    }

    let content = '⚖️ 见习女巫体重测量卷轴 ⚖️\n';
    content += '===================================\n\n';
    
    db.forEach(record => {
        let diffStr = 'N/A';
        if (record.diff !== null && record.diff !== undefined) {
            diffStr = (record.diff >= 0 ? '+' : '') + record.diff.toFixed(1) + ' kg';
        }
        content += `📅 日期：${record.date}\n`;
        content += `⚖️ 体重：${record.weight.toFixed(1)} kg\n`;
        content += `📊 较上次：${diffStr}\n`;
        content += '---------------------------\n';
    });

    const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `体重卷轴_${new Date().toISOString().split('T')[0]}.txt`;
    a.click();
    URL.revokeObjectURL(url);
}
</script>

</body>
</html>
