<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>魔法物品储藏室 - 见习女巫</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-blue: #e6f2ff;
            --secondary-blue: #cce7ff;
            --accent-blue: #a3d5ff;
            --soft-blue: #b8daff;
            --pale-blue: #f0f8ff;
            
            --text-dark: #4a5568;
            --text-light: #718096;
            --text-lighter: #a0aec0;
            
            --card-bg: rgba(255, 255, 255, 0.65);
            --card-border: rgba(255, 255, 255, 0.4);
            --shadow-sm: 0 2px 8px rgba(174, 200, 236, 0.1);
            --shadow-md: 0 4px 12px rgba(174, 200, 236, 0.15);
            --radius-sm: 8px;
            --radius-md: 10px;
            --radius-lg: 14px;
            
            --border-light: 1px solid rgba(226, 232, 240, 0.3);
        }

        * { 
            box-sizing: border-box; 
            font-family: 'Noto Sans SC', 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif; 
            margin: 0; 
            padding: 0;
            font-size: 13px;
        }

        body {
            background-color: var(--primary-blue);
            min-height: 100vh;
            padding: 20px;
            color: var(--text-dark);
            overflow-x: hidden;
            position: relative;
            line-height: 1.5;
        }

        .container {
            max-width: 1400px; 
            margin: auto; 
            position: relative; 
            z-index: 1;
        }

        .header {
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            margin-bottom: 24px; 
            padding: 18px 0 12px 0;
            background: transparent;
            backdrop-filter: none;
            border-radius: 0;
            box-shadow: none;
            border: none;
            position: relative;
        }
        
        .header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 3px;
            background: var(--accent-blue);
            border-radius: 2px;
        }
        
        .header h1 { 
            color: var(--text-dark); 
            margin: 0; 
            font-weight: 300;
            letter-spacing: 2px;
            font-family: 'Noto Serif SC', serif;
            font-size: 1.6em;
        }
        
        .header h1 i { 
            margin-right: 10px; 
            color: var(--accent-blue);
        }
        
        .back-link { 
            color: var(--text-light); 
            text-decoration: none; 
            font-weight: 500;
            font-size: 0.9em;
            transition: color 0.2s;
        }
        
        .back-link:hover { 
            color: var(--accent-blue);
        }

        .search-panel {
            background: var(--card-bg); 
            backdrop-filter: blur(8px);
            border-radius: var(--radius-md); 
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-sm);
            border: var(--border-light);
            border-left: none;
            transition: all 0.3s ease;
        }
        
        .search-panel:hover {
            box-shadow: var(--shadow-md);
        }
        
        .search-box {
            display: flex; 
            gap: 12px; 
            align-items: center;
        }
        
        .search-input-wrapper {
            flex: 1; 
            position: relative;
        }
        
        .search-input-wrapper i {
            position: absolute; 
            left: 12px; 
            top: 50%; 
            transform: translateY(-50%);
            color: var(--text-light);
            font-size: 0.9em;
        }
        
        .search-input-wrapper input {
            width: 100%; 
            padding: 10px 12px 10px 40px; 
            border: var(--border-light);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.8); 
            font-size: 0.9em; 
            color: var(--text-dark);
            transition: all 0.2s;
            font-family: inherit;
        }
        
        .search-input-wrapper input:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(163, 213, 255, 0.2);
        }
        
        .btn-add {
            padding: 10px 18px; 
            border: none; 
            border-radius: 10px;
            background: linear-gradient(135deg, var(--accent-blue), var(--soft-blue));
            color: white; 
            cursor: pointer; 
            font-size: 0.9em; 
            font-weight: 500;
            display: flex; 
            align-items: center; 
            gap: 6px; 
            transition: all 0.3s;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
        
        .btn-add:hover { 
            transform: translateY(-2px); 
            box-shadow: var(--shadow-md);
        }

        .alert-panel {
            background: var(--card-bg); 
            backdrop-filter: blur(8px);
            border-radius: var(--radius-md); 
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-sm);
            border: var(--border-light);
            border-left: none;
            transition: all 0.3s ease;
        }
        
        .alert-panel:hover {
            box-shadow: var(--shadow-md);
        }
        
        .alert-panel h3 {
            color: #ff9a9e; 
            margin: 0 0 12px 0;
            display: flex; 
            align-items: center; 
            gap: 8px;
            font-size: 1em;
            font-weight: 600;
        }
        
        .alert-list {
            display: flex; 
            flex-wrap: wrap; 
            gap: 8px;
        }
        
        .alert-item {
            background: rgba(255, 154, 158, 0.15); 
            padding: 6px 12px;
            border-radius: 12px; 
            font-size: 0.8em; 
            color: #ff9a9e;
            border: 1px solid rgba(255, 154, 158, 0.3);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .worn-panel {
            background: var(--card-bg); 
            backdrop-filter: blur(8px);
            border-radius: var(--radius-md); 
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-sm);
            border: var(--border-light);
            border-left: none;
            transition: all 0.3s ease;
        }
        
        .worn-panel:hover {
            box-shadow: var(--shadow-md);
        }
        
        .worn-panel h3 {
            color: #7eb8da; 
            margin: 0 0 12px 0;
            display: flex; 
            align-items: center; 
            gap: 8px;
            font-size: 1em;
            font-weight: 600;
        }
        
        .worn-list {
            display: flex; 
            flex-wrap: wrap; 
            gap: 8px;
        }
        
        .worn-item {
            background: rgba(126, 184, 218, 0.15); 
            padding: 6px 12px;
            border-radius: 12px; 
            font-size: 0.8em; 
            color: #7eb8da;
            border: 1px solid rgba(126, 184, 218, 0.3);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .tabs {
            display: flex; 
            gap: 8px; 
            margin-bottom: 20px; 
            flex-wrap: wrap;
        }
        
        .tab {
            padding: 8px 16px; 
            border: none; 
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.6); 
            color: var(--text-dark);
            cursor: pointer; 
            font-size: 0.85em; 
            font-weight: 500;
            transition: all 0.3s;
            display: flex; 
            align-items: center; 
            gap: 6px;
        }
        
        .tab:hover { 
            background: rgba(255, 255, 255, 0.8); 
            transform: translateY(-2px); 
        }
        
        .tab.active {
            background: linear-gradient(135deg, var(--accent-blue), var(--soft-blue));
            color: white; 
            box-shadow: var(--shadow-sm);
        }

        .items-grid {
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 15px;
        }
        
        .item-card {
            background: var(--card-bg); 
            backdrop-filter: blur(8px);
            border-radius: var(--radius-md); 
            padding: 15px;
            box-shadow: var(--shadow-sm);
            transition: all 0.3s; 
            position: relative;
            border: var(--border-light);
            border-left: none;
        }
        
        .item-card:hover { 
            transform: translateY(-3px); 
            box-shadow: var(--shadow-md); 
        }
        
        .item-card.expiring { 
            border-left: 3px solid #ff9a9e;
        }
        
        .item-card.expired { 
            border-left: 3px solid #e57373; 
            background: rgba(255, 154, 158, 0.1);
        }
        
        .item-card.worn { 
            border-left: 3px solid #7eb8da; 
        }

        .item-header {
            display: flex; 
            justify-content: space-between; 
            align-items: flex-start;
            margin-bottom: 12px;
        }
        
        .item-name {
            font-size: 1em; 
            font-weight: 600; 
            color: var(--text-dark);
            margin-bottom: 4px;
            line-height: 1.3;
        }
        
        .item-category {
            font-size: 0.75em; 
            padding: 2px 8px; 
            border-radius: 8px;
            background: var(--pale-blue); 
            color: var(--text-light);
            font-weight: 500;
        }
        
        .item-actions {
            display: flex; 
            gap: 4px;
        }
        
        .btn-icon {
            background: none; 
            border: none; 
            cursor: pointer;
            padding: 4px;
            border-radius: 4px; 
            transition: background 0.2s;
            color: var(--text-lighter);
            font-size: 0.9em;
        }
        
        .btn-edit { 
            color: var(--accent-blue); 
        }
        
        .btn-delete { 
            color: #ff9a9e; 
        }
        
        .btn-icon:hover { 
            background: rgba(0,0,0,0.05); 
        }

        .item-details { 
            display: flex; 
            flex-direction: column; 
            gap: 6px; 
        }
        
        .detail-row {
            display: flex; 
            align-items: center; 
            gap: 8px; 
            font-size: 0.85em;
        }
        
        .detail-row i { 
            color: var(--text-lighter); 
            width: 14px; 
            text-align: center;
            font-size: 0.9em;
        }
        
        .detail-row span { 
            color: var(--text-dark); 
        }
        
        .detail-row .expiring { 
            color: #ff9a9e; 
            font-weight: 600; 
        }
        
        .detail-row .expired { 
            color: #e57373; 
            font-weight: 600; 
        }

        .worn-checkbox {
            margin-top: 12px; 
            padding-top: 12px; 
            border-top: var(--border-light);
            display: flex; 
            align-items: center; 
            gap: 8px;
        }
        
        .worn-checkbox input[type="checkbox"] {
            width: 16px; 
            height: 16px; 
            cursor: pointer;
        }
        
        .worn-checkbox label {
            cursor: pointer; 
            font-size: 0.8em; 
            color: var(--text-light);
        }
        
        .worn-days {
            margin-left: auto; 
            font-size: 0.8em; 
            color: #7eb8da; 
            font-weight: 600;
        }

        .modal {
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background: rgba(0,0,0,0.3); 
            z-index: 1000; 
            backdrop-filter: blur(5px);
            align-items: center; 
            justify-content: center; 
            padding: 20px;
        }
        
        .modal.active { 
            display: flex; 
        }
        
        .modal-content {
            background: white; 
            border-radius: var(--radius-md); 
            padding: 20px; 
            width: 100%;
            max-width: 450px;
            box-shadow: var(--shadow-md); 
            max-height: 85vh; 
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            margin-bottom: 15px;
        }
        
        .modal-title { 
            color: var(--text-dark); 
            margin: 0; 
            font-size: 1.1em;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .modal-title i {
            color: var(--accent-blue);
        }
        
        .btn-close {
            background: none; 
            border: none; 
            font-size: 1.3em; 
            cursor: pointer;
            color: var(--text-lighter); 
            padding: 4px; 
            line-height: 1;
            transition: color 0.2s;
        }
        
        .btn-close:hover { 
            color: #ff9a9e; 
        }

        .form-group { 
            margin-bottom: 15px; 
        }
        
        .form-group label {
            display: block; 
            margin-bottom: 6px; 
            font-weight: 500;
            color: var(--text-light); 
            font-size: 0.85em;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .form-group input, 
        .form-group select, 
        .form-group textarea {
            width: 100%; 
            padding: 10px 12px; 
            border: var(--border-light);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.8); 
            font-size: 0.9em; 
            color: var(--text-dark);
            transition: all 0.2s;
            font-family: inherit;
        }
        
        .form-group input:focus, 
        .form-group select:focus, 
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(163, 213, 255, 0.2);
        }
        
        .form-group textarea { 
            resize: vertical; 
            min-height: 60px; 
        }
        
        .form-group small {
            color: var(--text-lighter);
            font-size: 0.8em;
            display: block;
            margin-top: 4px;
        }

        .modal-footer {
            display: flex; 
            gap: 12px; 
            margin-top: 20px;
        }
        
        .btn-cancel, .btn-submit {
            flex: 1; 
            padding: 10px; 
            border: none; 
            border-radius: 10px;
            cursor: pointer; 
            font-size: 0.9em; 
            font-weight: 500;
            transition: all 0.3s;
        }
        
        .btn-cancel {
            background: #f0f4f8; 
            color: var(--text-dark);
        }
        
        .btn-cancel:hover { 
            background: #e2e8f0; 
        }
        
        .btn-submit {
            background: linear-gradient(135deg, var(--accent-blue), var(--soft-blue));
            color: white;
        }
        
        .btn-submit:hover { 
            transform: translateY(-2px); 
            box-shadow: var(--shadow-md);
        }

        .empty-state {
            text-align: center; 
            padding: 40px 20px; 
            color: var(--text-light);
            grid-column: 1 / -1;
        }
        
        .empty-state i { 
            font-size: 2.5em; 
            margin-bottom: 12px; 
            opacity: 0.5; 
        }
        
        .empty-state p { 
            font-size: 0.95em;
            line-height: 1.5;
        }

        .category-research { background: rgba(163, 213, 255, 0.2) !important; color: #5a9bd5 !important; }
        .category-food { background: rgba(126, 184, 218, 0.2) !important; color: #4a9bc7 !important; }
        .category-clothes { background: rgba(255, 154, 158, 0.2) !important; color: #e57373 !important; }
        .category-life { background: rgba(255, 203, 107, 0.2) !important; color: #ff9800 !important; }

        ::-webkit-scrollbar { 
            width: 5px; 
        }
        
        ::-webkit-scrollbar-track { 
            background: transparent; 
        }
        
        ::-webkit-scrollbar-thumb { 
            background: var(--accent-blue); 
            border-radius: 3px; 
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: var(--soft-blue);
        }

        @media (max-width: 768px) {
            body {
                padding: 15px;
            }
            
            .header {
                flex-direction: column;
                gap: 12px;
                text-align: center;
            }
            
            .header::after {
                width: 60px;
            }
            
            .search-box {
                flex-direction: column;
                gap: 10px;
            }
            
            .btn-add {
                width: 100%;
                justify-content: center;
            }
            
            .tabs {
                justify-content: center;
            }
            
            .items-grid {
                grid-template-columns: 1fr;
            }
        }

        /* ===== API Key 弹窗 ===== */
        #apiKeyModal {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.45);
            z-index: 99999;
            display: flex; align-items: center; justify-content: center;
        }
        #apiKeyModal.hidden { display: none; }
        .api-key-box {
            background: white;
            padding: 26px 22px;
            border-radius: var(--radius-md);
            width: 340px;
            text-align: center;
            box-shadow: var(--shadow-md);
        }
        .api-key-box h3 {
            margin-bottom: 12px;
            color: var(--text-dark);
            font-size: 1.05em;
        }
        .api-key-box input {
            width: 100%;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 0.95em;
            margin-bottom: 12px;
        }
        .api-key-box button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--accent-blue), var(--soft-blue));
            color: white;
            font-size: 0.95em;
            cursor: pointer;
        }
        .api-key-tip {
            font-size: 0.75em;
            color: var(--text-light);
            margin-top: 10px;
        }
    </style>
</head>
<body>

<!-- ===== API Key 弹窗 ===== -->
<div id="apiKeyModal">
    <div class="api-key-box">
        <h3>🔑 请输入 GitHub Token</h3>
        <input id="apiKeyInput" type="password" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx">
        <button onclick="saveApiKey()">保存并进入</button>
        <div class="api-key-tip">
            Token 仅保存在本浏览器<br>
            权限只需勾选 <strong>gist</strong>
        </div>
    </div>
</div>

<div class="container">
    <div class="header">
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> 返回观测台</a>
        <h1><i class="fas fa-box-open"></i> 魔法物品储藏室</h1>
        <div></div>
    </div>

    <div class="search-panel">
        <div class="search-box">
            <div class="search-input-wrapper">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="搜索物品名称或存放地点..." onkeyup="filterItems()">
            </div>
            <button class="btn-add" onclick="openAddModal()">
                <i class="fas fa-plus"></i> 添加新物品
            </button>
        </div>
    </div>

    <div class="alert-panel" id="alertPanel" style="display: none;">
        <h3><i class="fas fa-exclamation-triangle"></i> 魔力衰减警报</h3>
        <div class="alert-list" id="alertList"></div>
    </div>

    <div class="worn-panel" id="wornPanel" style="display: none;">
        <h3><i class="fas fa-tshirt"></i> 正在穿着的法袍</h3>
        <div class="worn-list" id="wornList"></div>
    </div>

    <div class="tabs">
        <button class="tab active" onclick="switchTab('all')">
            <i class="fas fa-layer-group"></i> 全部物品
        </button>
        <button class="tab" onclick="switchTab('research')">
            <i class="fas fa-flask"></i> 科研物资
        </button>
        <button class="tab" onclick="switchTab('food')">
            <i class="fas fa-apple-alt"></i> 魔法食材
        </button>
        <button class="tab" onclick="switchTab('clothes')">
            <i class="fas fa-tshirt"></i> 法师服饰
        </button>
        <button class="tab" onclick="switchTab('life')">
            <i class="fas fa-home"></i> 生活用品
        </button>
    </div>

    <div class="items-grid" id="itemsGrid"></div>
</div>

<div class="modal" id="itemModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 class="modal-title" id="modalTitle">
                <i class="fas fa-plus-circle"></i> 添加新物品
            </h3>
            <button class="btn-close" onclick="closeModal()">&times;</button>
        </div>
        <form id="itemForm" onsubmit="saveItem(event)">
            <div class="form-group">
                <label><i class="fas fa-tag"></i> 物品名称</label>
                <input type="text" id="itemName" required placeholder="例如：龙血粉末">
            </div>
            <div class="form-group">
                <label><i class="fas fa-map-marker-alt"></i> 存放地点</label>
                <input type="text" id="itemLocation" required placeholder="例如：西北角三层架">
            </div>
            <div class="form-group">
                <label><i class="fas fa-layer-group"></i> 物品分类</label>
                <select id="itemCategory" required onchange="toggleExpiryField()">
                    <option value="research">🔬 科研物资</option>
                    <option value="food">🍎 魔法食材</option>
                    <option value="clothes">👕 法师服饰</option>
                    <option value="life">🏠 生活用品</option>
                </select>
            </div>
            <div class="form-group" id="expiryGroup">
                <label><i class="fas fa-hourglass-end"></i> 有效期至（可选）</label>
                <input type="date" id="itemExpiry">
                <small>衣物和生活用品可不填</small>
            </div>
            <div class="form-group" id="wornGroup" style="display: none;">
                <label><i class="fas fa-walking"></i> 穿着状态</label>
                <div style="display: flex; align-items: center; gap: 10px; margin-top: 10px;">
                    <input type="checkbox" id="itemWorn" style="width: auto;">
                    <label for="itemWorn" style="margin-bottom: 0;">目前正在穿着此衣物</label>
                </div>
            </div>
            <input type="hidden" id="itemId">
            <div class="modal-footer">
                <button type="button" class="btn-cancel" onclick="closeModal()">取消</button>
                <button type="submit" class="btn-submit">保存物品</button>
            </div>
        </form>
    </div>
</div>

<script>
/* ==========================================
   API Key 管理（不再依赖 gist-db.js）
   ========================================== */
const STORAGE_KEY = 'witch_api_key';
const GIST_ID = 'c9b52465d580c277cb7e55ac9e589ed4';
const GIST_FILE = 'witchlife.json';
const ITEMS_DB_KEY = 'witchItemsDB';

function getApiKey() {
    return localStorage.getItem(STORAGE_KEY) || '';
}

function saveApiKey() {
    const key = document.getElementById('apiKeyInput').value.trim();
    if (!key) return alert('请输入 Token');
    localStorage.setItem(STORAGE_KEY, key);
    document.getElementById('apiKeyModal').classList.add('hidden');
    loadItemsData();
}

/* 页面加载判断 */
document.addEventListener('DOMContentLoaded', () => {
    if (getApiKey()) {
        document.getElementById('apiKeyModal').classList.add('hidden');
        loadItemsData();
    }
});

/* ==========================================
   Gist 读写（动态 Token）
   ========================================== */
async function gistLoad() {
    const res = await fetch(`https://api.github.com/gists/${GIST_ID}`);
    if (!res.ok) throw new Error();
    const gist = await res.json();
    if (gist.files[GIST_FILE]?.content) {
        return JSON.parse(gist.files[GIST_FILE].content);
    }
    return {};
}

async function gistSave(data) {
    const token = getApiKey();
    if (!token) return false;
    const res = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
        method: 'PATCH',
        headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json'
        },
        body: JSON.stringify({
            files: {
                [GIST_FILE]: { content: JSON.stringify(data, null, 2) }
            }
        })
    });
    return res.ok;
}

async function getItemsData() {
    const all = await gistLoad();
    return all[ITEMS_DB_KEY] || [];
}

async function saveItemsData(items) {
    const all = await gistLoad();
    all[ITEMS_DB_KEY] = items;
    return gistSave(all);
}

/* ==========================================
   内存缓存
   ========================================== */
let itemsDB = [];

/* ==========================================
   初始化
   ========================================== */
async function loadItemsData() {
    try {
        itemsDB = await getItemsData();
        updateAllViews();
    } catch {
        alert('⚠️ 读取云端数据失败，请检查 Token 是否正确');
    }
}

/* ==========================================
   工具函数
   ========================================== */
function generateId() {
    return Date.now().toString(36) + Math.random().toString(36).substr(2);
}

function formatDate(dateString) {
    if (!dateString) return '无期限';
    const date = new Date(dateString);
    return `${date.getFullYear()}年${date.getMonth()+1}月${date.getDate()}日`;
}

function getDaysUntilExpiry(expiryDate) {
    if (!expiryDate) return null;
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    const expiry = new Date(expiryDate);
    expiry.setHours(0, 0, 0, 0);
    const diffTime = expiry.getTime() - today.getTime();
    return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
}

function getDaysWorn(wornDate) {
    if (!wornDate) return 0;
    const worn = new Date(wornDate);
    const today = new Date();
    worn.setHours(0, 0, 0, 0);
    today.setHours(0, 0, 0, 0);
    const diffTime = today.getTime() - worn.getTime();
    return Math.floor(diffTime / (1000 * 60 * 60 * 24));
}

function getCategoryInfo(category) {
    const categories = {
        'research': { name: '科研', icon: '🔬', class: 'category-research' },
        'food': { name: '食材', icon: '🍎', class: 'category-food' },
        'clothes': { name: '服饰', icon: '👕', class: 'category-clothes' },
        'life': { name: '生活', icon: '🏠', class: 'category-life' }
    };
    return categories[category] || categories['life'];
}

/* ==========================================
   渲染逻辑
   ========================================== */
let currentTab = 'all';
let currentSearch = '';

function renderItems() {
    const grid = document.getElementById('itemsGrid');
    
    let filteredItems = itemsDB.filter(item => {
        const matchesTab = currentTab === 'all' || item.category === currentTab;
        const matchesSearch = !currentSearch || 
            item.name.toLowerCase().includes(currentSearch.toLowerCase()) ||
            item.location.toLowerCase().includes(currentSearch.toLowerCase());
        return matchesTab && matchesSearch;
    });

    if (filteredItems.length === 0) {
        grid.innerHTML = `
            <div class="empty-state">
                <i class="fas fa-box-open"></i>
                <p>${currentSearch ? '没有找到匹配的物品...' : '储藏室空空如也~<br>点击上方按钮添加第一件物品吧！'}</p>
            </div>
        `;
        return;
    }

    filteredItems.sort((a, b) => {
        const aDays = getDaysUntilExpiry(a.expiryDate);
        const bDays = getDaysUntilExpiry(b.expiryDate);
        
        if (aDays !== null && aDays < 0 && (bDays === null || bDays >= 0)) return -1;
        if (bDays !== null && bDays < 0 && (aDays === null || aDays >= 0)) return 1;
        
        if (aDays !== null && aDays <= 7 && (bDays === null || bDays > 7)) return -1;
        if (bDays !== null && bDays <= 7 && (aDays === null || aDays > 7)) return 1;
        
        if (a.isWorn && !b.isWorn) return -1;
        if (b.isWorn && !a.isWorn) return 1;
        
        return new Date(b.createdAt) - new Date(a.createdAt);
    });

    grid.innerHTML = filteredItems.map(item => {
        const categoryInfo = getCategoryInfo(item.category);
        const daysUntilExpiry = getDaysUntilExpiry(item.expiryDate);
        const daysWorn = getDaysWorn(item.wornDate);
        
        let expiryClass = '';
        let expiryText = '';
        
        if (daysUntilExpiry !== null) {
            if (daysUntilExpiry < 0) {
                expiryClass = 'expired';
                expiryText = `已过期 ${-daysUntilExpiry} 天`;
            } else if (daysUntilExpiry === 0) {
                expiryClass = 'expiring';
                expiryText = '今日过期！';
            } else if (daysUntilExpiry <= 7) {
                expiryClass = 'expiring';
                expiryText = `${daysUntilExpiry} 天后过期`;
            } else {
                expiryText = `${daysUntilExpiry} 天后过期`;
            }
        }
        
        const isExpiring = daysUntilExpiry !== null && daysUntilExpiry <= 7;
        const isExpired = daysUntilExpiry !== null && daysUntilExpiry < 0;
        const isWorn = item.isWorn && item.category === 'clothes';
        
        return `
            <div class="item-card ${isExpired ? 'expired' : isExpiring ? 'expiring' : ''} ${isWorn ? 'worn' : ''}">
                <div class="item-header">
                    <div>
                        <div class="item-name">${item.name}</div>
                        <span class="item-category ${categoryInfo.class}">${categoryInfo.icon} ${categoryInfo.name}</span>
                    </div>
                    <div class="item-actions">
                        <button class="btn-icon btn-edit" onclick="openEditModal('${item.id}')" title="编辑">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button class="btn-icon btn-delete" onclick="deleteItem('${item.id}')" title="删除">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                </div>
                <div class="item-details">
                    <div class="detail-row">
                        <i class="fas fa-map-marker-alt"></i>
                        <span>${item.location}</span>
                    </div>
                    ${item.expiryDate ? `
                    <div class="detail-row">
                        <i class="fas fa-calendar-times"></i>
                        <span class="${expiryClass}">${expiryText}</span>
                    </div>
                    ` : ''}
                    ${item.category === 'clothes' ? `
                    <div class="worn-checkbox">
                        <input type="checkbox" id="worn-${item.id}" ${item.isWorn ? 'checked' : ''} 
                               onchange="toggleWorn('${item.id}', this.checked)">
                        <label for="worn-${item.id}">正在穿着</label>
                        ${daysWorn > 0 ? `<span class="worn-days">已穿 ${daysWorn} 天</span>` : ''}
                    </div>
                    ` : ''}
                </div>
            </div>
        `;
    }).join('');
}

function renderAlerts() {
    const alertPanel = document.getElementById('alertPanel');
    const alertList = document.getElementById('alertList');
    
    const expiringItems = itemsDB.filter(item => {
        const days = getDaysUntilExpiry(item.expiryDate);
        return days !== null && days <= 7 && days >= 0;
    }).sort((a, b) => getDaysUntilExpiry(a.expiryDate) - getDaysUntilExpiry(b.expiryDate));
    
    const expiredItems = itemsDB.filter(item => {
        const days = getDaysUntilExpiry(item.expiryDate);
        return days !== null && days < 0;
    });
    
    if (expiringItems.length === 0 && expiredItems.length === 0) {
        alertPanel.style.display = 'none';
        return;
    }
    
    alertPanel.style.display = 'block';
    let html = '';
    
    if (expiredItems.length > 0) {
        html += expiredItems.map(item => `
            <div class="alert-item">
                <i class="fas fa-skull-crossbones"></i> ${item.name}（已过期 ${-getDaysUntilExpiry(item.expiryDate)} 天）
            </div>
        `).join('');
    }
    
    if (expiringItems.length > 0) {
        html += expiringItems.map(item => {
            const days = getDaysUntilExpiry(item.expiryDate);
            return `
                <div class="alert-item">
                    <i class="fas fa-clock"></i> ${item.name}（${days === 0 ? '今日过期' : days + '天后过期'}）
                </div>
            `;
        }).join('');
    }
    
    alertList.innerHTML = html;
}

function renderWornItems() {
    const wornPanel = document.getElementById('wornPanel');
    const wornList = document.getElementById('wornList');
    
    const wornItems = itemsDB.filter(item => item.isWorn && item.category === 'clothes');
    
    if (wornItems.length === 0) {
        wornPanel.style.display = 'none';
        return;
    }
    
    wornPanel.style.display = 'block';
    wornList.innerHTML = wornItems.map(item => {
        const daysWorn = getDaysWorn(item.wornDate);
        return `
            <div class="worn-item">
                <i class="fas fa-tshirt"></i> ${item.name}（已穿 ${daysWorn} 天）
            </div>
        `;
    }).join('');
}

function updateAllViews() {
    renderItems();
    renderAlerts();
    renderWornItems();
}

/* ==========================================
   交互功能
   ========================================== */
function switchTab(tab) {
    currentTab = tab;
    
    document.querySelectorAll('.tab').forEach(t => {
        t.classList.remove('active');
        if (t.textContent.includes(tab === 'all' ? '全部' : 
            tab === 'research' ? '科研' : 
            tab === 'food' ? '食材' : 
            tab === 'clothes' ? '服饰' : '生活')) {
            t.classList.add('active');
        }
    });
    
    renderItems();
}

function filterItems() {
    currentSearch = document.getElementById('searchInput').value;
    renderItems();
}

function toggleExpiryField() {
    const category = document.getElementById('itemCategory').value;
    const expiryGroup = document.getElementById('expiryGroup');
    const wornGroup = document.getElementById('wornGroup');
    
    if (category === 'clothes') {
        expiryGroup.style.display = 'none';
        wornGroup.style.display = 'block';
    } else {
        expiryGroup.style.display = 'block';
        wornGroup.style.display = 'none';
    }
}

function openAddModal() {
    document.getElementById('modalTitle').innerHTML = '<i class="fas fa-plus-circle"></i> 添加新物品';
    document.getElementById('itemForm').reset();
    document.getElementById('itemId').value = '';
    document.getElementById('expiryGroup').style.display = 'block';
    document.getElementById('wornGroup').style.display = 'none';
    document.getElementById('itemModal').classList.add('active');
}

function openEditModal(id) {
    const item = itemsDB.find(i => i.id === id);
    if (!item) return;
    
    document.getElementById('modalTitle').innerHTML = '<i class="fas fa-edit"></i> 编辑物品';
    document.getElementById('itemId').value = item.id;
    document.getElementById('itemName').value = item.name;
    document.getElementById('itemLocation').value = item.location;
    document.getElementById('itemCategory').value = item.category;
    document.getElementById('itemExpiry').value = item.expiryDate || '';
    document.getElementById('itemWorn').checked = item.isWorn || false;
    
    toggleExpiryField();
    
    if (item.category === 'clothes') {
        document.getElementById('wornGroup').style.display = 'block';
    }
    
    document.getElementById('itemModal').classList.add('active');
}

function closeModal() {
    document.getElementById('itemModal').classList.remove('active');
}

async function saveItem(event) {
    event.preventDefault();
    
    const id = document.getElementById('itemId').value;
    const name = document.getElementById('itemName').value.trim();
    const location = document.getElementById('itemLocation').value.trim();
    const category = document.getElementById('itemCategory').value;
    const expiryDate = document.getElementById('itemExpiry').value;
    const isWorn = document.getElementById('itemWorn').checked;
    
    if (!name || !location) {
        alert('请填写物品名称和存放地点！');
        return;
    }
    
    if (id) {
        const index = itemsDB.findIndex(item => item.id === id);
        if (index !== -1) {
            const oldItem = itemsDB[index];
            itemsDB[index] = {
                ...oldItem,
                name,
                location,
                category,
                expiryDate: expiryDate,
                isWorn: category === 'clothes' ? isWorn : false,
                wornDate: (category === 'clothes' && isWorn && !oldItem.isWorn) ? new Date().toISOString() : 
                         (category === 'clothes' && !isWorn) ? null : oldItem.wornDate
            };
        }
    } else {
        itemsDB.push({
            id: generateId(),
            name,
            location,
            category,
            expiryDate: expiryDate,
            isWorn: category === 'clothes' ? isWorn : false,
            wornDate: (category === 'clothes' && isWorn) ? new Date().toISOString() : null,
            createdAt: new Date().toISOString()
        });
    }
    
    await saveItemsData(itemsDB);
    updateAllViews();
    closeModal();
    
    alert(id ? '物品信息已更新！✨' : '新物品已入库！✨');
}

async function deleteItem(id) {
    if (!confirm('确定要销毁这件物品吗？此操作无法撤销！')) return;
    
    itemsDB = itemsDB.filter(item => item.id !== id);
    await saveItemsData(itemsDB);
    updateAllViews();
    
    alert('物品已从储藏室移除~');
}

async function toggleWorn(id, isWorn) {
    const index = itemsDB.findIndex(item => item.id === id);
    
    if (index !== -1) {
        itemsDB[index].isWorn = isWorn;
        itemsDB[index].wornDate = isWorn ? new Date().toISOString() : null;
        await saveItemsData(itemsDB);
        updateAllViews();
        
        const action = isWorn ? '穿上' : '脱下';
        alert(`已${action} ${itemsDB[index].name}~`);
    }
}

// 点击模态框外部关闭
document.getElementById('itemModal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
});
</script>
